<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Maddy Beal</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <!-- Top Apple-like nav -->
  <header class="globalnav" role="banner">
    <div class="globalnav__inner">
      <a class="globalnav__logo" href="#introduction" aria-label="Home">
        
      </a>

      <nav class="globalnav__menu" aria-label="Primary navigation">
        <a href="#introduction">Introduction</a>
        <a href="#ambitions">Ambitions</a>
        <a href="#hobbies">Hobbies</a>
        <a href="#experience">Experience</a>
        <a href="#projects">Projects</a>
      </nav>

  </header>

  <main>
    <!-- Page title like "iPhone" -->
    <section class="pagehead">
      <div class="wrap">
        <h1 class="pagetitle">Maddy</h1>
      </div>
    </section>

    <!-- Header image spanning the website -->
    <section class="headerHero" aria-label="Header image">
      <img
        src="assets/header.jpeg"
        alt="A header image representing Maddy"
      />
    </section>

    <!-- Placeholder sections so nav links work -->
    <section id="introduction" class="section"><div class="wrap"><h2>Introduction</h2></div></section>
    <section id="ambitions" class="section"><div class="wrap"><h2>Ambitions</h2></div></section>
    <section id="hobbies" class="section"><div class="wrap"><h2>Hobbies</h2></div></section>
    <section id="experience" class="section"><div class="wrap"><h2>Experience</h2></div></section>
